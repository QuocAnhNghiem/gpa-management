apiVersion: v1
kind: ConfigMap
metadata:
  name: gpa-backend-config
  namespace: gpa-staging
  labels:
    app.kubernetes.io/part-of: gpa-management
data:
  NODE_ENV: "production"
  APP_ENV: "staging"
  GOOGLE_OAUTH_ENABLED: "true"
  PORT: "5000"
  FRONTEND_URL: "https://app.<your-domain>"
  COOKIE_DOMAIN: ".<your-domain>"
  AWS_REGION: "ap-southeast-1"
  S3_BUCKET_NAME: "<upload-bucket-name>"
  S3_UPLOAD_BUCKET: "<upload-bucket-name>"
  S3_UPLOAD_PREFIX: "uploads"
  S3_PUBLIC_BASE_URL: "https://<upload-assets-domain>"
  S3_PRESIGNED_URL_EXPIRES_IN: "300"
  ENABLE_TEST_ROUTES: "false"
