apiVersion: v1
kind: ConfigMap
metadata:
  name: gpa-backend-config
  namespace: gpa-prod
  labels:
    app.kubernetes.io/part-of: gpa-management
    environment: production
data:
  NODE_ENV: "production"
  APP_ENV: "production"
  GOOGLE_OAUTH_ENABLED: "false"
  PORT: "5000"
  FRONTEND_URL: "https://app.<your-domain>"
  COOKIE_DOMAIN: ".<your-domain>"
  AWS_REGION: "ap-southeast-1"
  S3_BUCKET_NAME: "<prod-upload-bucket-name>"
  S3_UPLOAD_BUCKET: "<prod-upload-bucket-name>"
  S3_UPLOAD_PREFIX: "prod/uploads"
  S3_PUBLIC_BASE_URL: "https://<prod-upload-assets-domain>"
  S3_PRESIGNED_URL_EXPIRES_IN: "300"
  ENABLE_TEST_ROUTES: "false"
